<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Customer Registration</title>
    <style>
        body {
            font-family: Arial;
            background-color: #f4f4f4;
        }

        .container {
            width: 400px;
            margin: 100px auto;
            padding: 20px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 0 10px gray;
        }

        h2 {
            text-align: center;
        }

        .form-group {
            display: flex;
            justify-content: space-between;
            margin: 10px 0;
        }

        label {
            width: 40%;
            font-weight: bold;
        }

        input {
            width: 55%;
            padding: 5px;
        }

        button {
            width: 100%;
            margin-top: 15px;
            padding: 10px;
            background-color: blue;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            }

        button:hover {
            background-color: darkblue;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Customer Info</h2>

    <form action="newcustomer.php" method="post">

        <div class="form-group">
            <label>CID</label>
            <input type="text" name="cid" required>
        </div>

        <div class="form-group">
            <label>Name</label>
            <input type="text" name="cname" required>
        </div>

        <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" required>
        </div>

        <div class="form-group">
            <label>Age</label>
            <input type="number" name="age" required>
        </div>

        <div class="form-group">
            <label>City</label>
            <input type="text" name="city" required>
        </div>

        <div class="form-group">
            <label>State</label>
            <input type="text" name="state" required>
        </div>

        <button type="submit">Save</button>

    </form>
</div>

</body>
</html>
